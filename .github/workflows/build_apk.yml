name: Build PhotoFinder APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Extract zip
        run: unzip photofinder_complete.zip

      - name: Get Flutter packages
        working-directory: photofinder/flutter_app/photofinder
        run: flutter pub get

      - name: Build APK
        working-directory: photofinder/flutter_app/photofinder
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhotoFinder-APK
          path: photofinder/flutter_app/photofinder/build/app/outputs/flutter-apk/app-release.apk
