name: Build PhotoFinder APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Extract zip
        run: unzip photofinder_complete.zip

      - name: Enable AndroidX
        working-directory: photofinder/flutter_app/photofinder
        run: |
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties

      - name: Flutter pub get
        working-directory: photofinder/flutter_app/photofinder
        run: flutter pub get

      - name: Accept licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Build APK
        working-directory: photofinder/flutter_app/photofinder
        run: flutter build apk --release --no-shrink

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: PhotoFinder-APK
          path: photofinder/flutter_app/photofinder/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
